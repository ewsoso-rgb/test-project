<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로또 번호 생성기</title>
    <style>
      :root {
        --bg-light: #f5f7fb;
        --text-light: #171b22;
        --card-bg-light: #fff;
        --card-border-light: #e5e8ef;
        --card-shadow-light: rgba(28, 38, 58, 0.08);
        --text-muted-light: #697386;
        --line-bg-light: #f8fafc;
        --label-text-light: #788294;

        --bg-dark: #1a1a1a;
        --text-dark: #e0e0e0;
        --card-bg-dark: #2a2a2a;
        --card-border-dark: #444;
        --card-shadow-dark: rgba(0, 0, 0, 0.2);
        --text-muted-dark: #aaa;
        --line-bg-dark: #3a3a3a;
        --label-text-dark: #ccc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg-light);
        color: var(--text-light);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Arial, sans-serif;
        letter-spacing: 0;
        transition: background-color 0.3s, color 0.3s;
      }

      body.dark-mode {
        background: var(--bg-dark);
        color: var(--text-dark);
      }

      main {
        width: min(720px, calc(100% - 32px));
        padding: 42px;
        border: 1px solid var(--card-border-light);
        border-radius: 8px;
        background: var(--card-bg-light);
        box-shadow: 0 18px 50px var(--card-shadow-light);
        transition: background-color 0.3s, border-color 0.3s, box-shadow 0.3s;
      }

      body.dark-mode main {
        border-color: var(--card-border-dark);
        background: var(--card-bg-dark);
        box-shadow: 0 18px 50px var(--card-shadow-dark);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1.1;
      }

      p {
        margin: 0 0 28px;
        color: var(--text-muted-light);
        font-size: 16px;
        transition: color 0.3s;
      }

      body.dark-mode p {
        color: var(--text-muted-dark);
      }

      button {
        width: 100%;
        height: 54px;
        border: 0;
        border-radius: 8px;
        background: #ff7f3f;
        color: #fff;
        font-size: 17px;
        font-weight: 800;
        cursor: pointer;
      }

      button:active {
        transform: translateY(1px);
      }

      .results {
        display: grid;
        gap: 14px;
        margin-top: 28px;
      }

      .line {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px;
        border-radius: 8px;
        background: var(--line-bg-light);
        transition: background-color 0.3s;
      }

      body.dark-mode .line {
        background: var(--line-bg-dark);
      }

      .label {
        width: 42px;
        color: var(--label-text-light);
        font-weight: 800;
        transition: color 0.3s;
      }

      body.dark-mode .label {
        color: var(--label-text-dark);
      }

      .numbers {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .ball {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: #17202c;
        color: #fff;
        font-weight: 900;
      }

      .ball.yellow {
        background: #f3b51b;
      }

      .ball.blue {
        background: #3f80e0;
      }

      .ball.red {
        background: #ef5b55;
      }

      .ball.gray {
        background: #7b8794;
      }

      .ball.green {
        background: #35a86b;
      }

      .theme-switch-wrapper {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        margin-bottom: 20px;
      }

      .theme-switch {
        display: inline-block;
        height: 24px;
        position: relative;
        width: 48px;
      }

      .theme-switch input { 
        display:none;
      }

      .slider {
        background-color: #ccc;
        bottom: 0;
        cursor: pointer;
        left: 0;
        position: absolute;
        right: 0;
        top: 0;
        transition: .4s;
      }

      .slider:before {
        background-color: #fff;
        bottom: 4px;
        content: "";
        height: 16px;
        left: 4px;
        position: absolute;
        transition: .4s;
        width: 16px;
      }

      input:checked + .slider {
        background-color: #2196F3;
      }

      input:checked + .slider:before {
        transform: translateX(24px);
      }

      .slider.round {
        border-radius: 24px;
      }

      .slider.round:before {
        border-radius: 50%;
      }

      @media (max-width: 520px) {
        main {
          padding: 28px 20px;
        }

        .line {
          align-items: flex-start;
          flex-direction: column;
        }

        .ball {
          width: 38px;
          height: 38px;
        }
      }
    </style>
  </head>
  <body>
    <div class="theme-switch-wrapper">
      <label class="theme-switch" for="checkbox">
        <input type="checkbox" id="checkbox" />
        <div class="slider round"></div>
      </label>
    </div>
    <main>
      <h1>로또 번호 생성기</h1>
      <p>버튼을 누르면 1부터 45까지 중복 없는 번호 6개가 5게임 생성됩니다.</p>
      <button id="generateButton" type="button">로또 번호 5게임 만들기</button>
      <section id="results" class="results" aria-live="polite"></section>
    </main>

    <script>
      const button = document.querySelector("#generateButton");
      const results = document.querySelector("#results");
      const themeToggle = document.getElementById('checkbox');
      const body = document.body;

      // Check for saved theme preference
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
          body.classList.add('dark-mode');
          themeToggle.checked = true;
      } else {
          // Default to light mode
          body.classList.remove('dark-mode');
          themeToggle.checked = false;
      }

      themeToggle.addEventListener('change', () => {
          body.classList.toggle('dark-mode');

          // Save theme preference
          if (body.classList.contains('dark-mode')) {
              localStorage.setItem('theme', 'dark');
          } else {
              localStorage.setItem('theme', 'light');
          }
      });

      function pickNumbers() {
        const pool = Array.from({ length: 45 }, (_, index) => index + 1);

        for (let index = pool.length - 1; index > 0; index -= 1) {
          const randomIndex = Math.floor(Math.random() * (index + 1));
          [pool[index], pool[randomIndex]] = [pool[randomIndex], pool[index]];
        }

        return pool.slice(0, 6).sort((a, b) => a - b);
      }

      function getColorClass(number) {
        if (number <= 10) return "yellow";
        if (number <= 20) return "blue";
        if (number <= 30) return "red";
        if (number <= 40) return "gray";
        return "green";
      }

      function renderGames() {
        const games = Array.from({ length: 5 }, pickNumbers);

        results.innerHTML = games
          .map((numbers, index) => {
            const balls = numbers
              .map((number) => `<span class="ball ${getColorClass(number)}">${number}</span>`)
              .join("");

            return `
              <div class="line">
                <span class="label">${index + 1}게임</span>
                <div class="numbers">${balls}</div>
              </div>
            `;
          })
          .join("");
      }

      button.addEventListener("click", renderGames);

      // Initial render
      renderGames();
    </script>
  </body>
</html>
