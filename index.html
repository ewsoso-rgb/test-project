<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로또 번호 생성기</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fb;
        color: #171b22;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Arial, sans-serif;
        letter-spacing: 0;
      }

      main {
        width: min(720px, calc(100% - 32px));
        padding: 42px;
        border: 1px solid #e5e8ef;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 18px 50px rgba(28, 38, 58, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1.1;
      }

      p {
        margin: 0 0 28px;
        color: #697386;
        font-size: 16px;
      }

      button {
        width: 100%;
        height: 54px;
        border: 0;
        border-radius: 8px;
        background: #ff7f3f;
        color: #fff;
        font-size: 17px;
        font-weight: 800;
        cursor: pointer;
      }

      button:active {
        transform: translateY(1px);
      }

      .results {
        display: grid;
        gap: 14px;
        margin-top: 28px;
      }

      .line {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px;
        border-radius: 8px;
        background: #f8fafc;
      }

      .label {
        width: 42px;
        color: #788294;
        font-weight: 800;
      }

      .numbers {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .ball {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: #17202c;
        color: #fff;
        font-weight: 900;
      }

      .ball.yellow {
        background: #f3b51b;
      }

      .ball.blue {
        background: #3f80e0;
      }

      .ball.red {
        background: #ef5b55;
      }

      .ball.gray {
        background: #7b8794;
      }

      .ball.green {
        background: #35a86b;
      }

      @media (max-width: 520px) {
        main {
          padding: 28px 20px;
        }

        .line {
          align-items: flex-start;
          flex-direction: column;
        }

        .ball {
          width: 38px;
          height: 38px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>로또 번호 생성기</h1>
      <p>버튼을 누르면 1부터 45까지 중복 없는 번호 6개가 5게임 생성됩니다.</p>
      <button id="generateButton" type="button">로또 번호 5게임 만들기</button>
      <section id="results" class="results" aria-live="polite"></section>
    </main>

    <script>
      const button = document.querySelector("#generateButton");
      const results = document.querySelector("#results");

      function pickNumbers() {
        const pool = Array.from({ length: 45 }, (_, index) => index + 1);

        for (let index = pool.length - 1; index > 0; index -= 1) {
          const randomIndex = Math.floor(Math.random() * (index + 1));
          [pool[index], pool[randomIndex]] = [pool[randomIndex], pool[index]];
        }

        return pool.slice(0, 6).sort((a, b) => a - b);
      }

      function getColorClass(number) {
        if (number <= 10) return "yellow";
        if (number <= 20) return "blue";
        if (number <= 30) return "red";
        if (number <= 40) return "gray";
        return "green";
      }

      function renderGames() {
        const games = Array.from({ length: 5 }, pickNumbers);

        results.innerHTML = games
          .map((numbers, index) => {
            const balls = numbers
              .map((number) => `<span class="ball ${getColorClass(number)}">${number}</span>`)
              .join("");

            return `
              <div class="line">
                <span class="label">${index + 1}게임</span>
                <div class="numbers">${balls}</div>
              </div>
            `;
          })
          .join("");
      }

      button.addEventListener("click", renderGames);
    </script>
  </body>
</html>
